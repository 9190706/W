<!DOCTYPE html>
<html>
<head>
<title>Angel</title>

<style>

body{
margin:0;
height:100vh;
background:linear-gradient(135deg,#f8f8fa,#dfe7ff);
display:flex;
justify-content:center;
align-items:center;
font-family:-apple-system,BlinkMacSystemFont;
}

.phone{

width:320px;
height:650px;
border-radius:45px;
background:rgba(255,255,255,.35);
backdrop-filter:blur(20px);
box-shadow:
0 30px 80px rgba(0,0,0,.25),
inset 0 0 30px white;

padding:20px;
}


.notch{

width:120px;
height:30px;
background:#111;
border-radius:20px;
margin:auto;

}


.time{

font-size:50px;
font-weight:700;
margin-top:35px;
}


.title{

font-size:28px;
font-weight:600;

}


.apps{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
margin-top:40px;

}


.app{

height:70px;
border-radius:20px;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
box-shadow:0 10px 20px #ccc;

}


.name{

text-align:center;
margin-top:8px;

}


</style>

</head>


<body>


<div class="phone">

<div class="notch"></div>


<div class="time">
00:00
</div>


<div class="title">
Angel
</div>


<div class="apps">


<div>
<div class="app">💬</div>
<div class="name">聊天</div>
</div>


<div>
<div class="app">📱</div>
<div class="name">手机</div>
</div>


<div>
<div class="app">🔍</div>
<div class="name">查找</div>
</div>


<div>
<div class="app">💗</div>
<div class="name">AI</div>
</div>


<div>
<div class="app">🌸</div>
<div class="name">微博</div>
</div>


<div>
<div class="app">📍</div>
<div class="name">线下</div>
</div>


</div>


</div>


</body>
</html>
