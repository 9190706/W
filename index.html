</html><!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Chat</title>


<style>

*{
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif;
}


body{

margin:0;

height:100vh;

background:#dfe4ec;

display:flex;

justify-content:center;

align-items:center;

}



.phone{

width:390px;

height:844px;

border-radius:45px;

overflow:hidden;

background:
linear-gradient(145deg,#fff,#e8edf5);

padding:30px 25px;

position:relative;

}



header{

display:flex;

justify-content:space-between;

align-items:center;

}



button{

border:0;

background:none;

font-size:18px;

}



.glass{


margin-top:25px;

padding:20px;

border-radius:30px;

background:

rgba(255,255,255,.5);

backdrop-filter:blur(25px);

}



#contacts{

margin-top:20px;

}



.contact{


padding:15px;

border-radius:25px;

background:

rgba(255,255,255,.45);

margin-bottom:15px;


display:flex;

align-items:center;

}



.avatar{

width:55px;

height:55px;

border-radius:20px;

background:#ddd;

margin-right:15px;

}



.empty{

margin-top:150px;

text-align:center;

color:#999;

}



.bottom{


position:absolute;

bottom:25px;

left:25px;

right:25px;

height:65px;

border-radius:35px;

background:

rgba(255,255,255,.55);

display:flex;

justify-content:space-around;

align-items:center;

}




#chatRoom{

display:none;

height:100%;

}



.messages{

height:650px;

overflow:auto;

margin-top:20px;

}



.msg{

padding:12px 16px;

border-radius:20px;

margin:10px 0;

max-width:75%;

}



.user{

margin-left:auto;

background:#222;

color:white;

}



.char{

background:white;

}



.input{

position:absolute;

bottom:25px;

left:25px;

right:25px;

display:flex;

}



input{

flex:1;

height:45px;

border-radius:25px;

border:0;

padding:0 15px;

}



.send{

width:60px;

}


</style>

</head>



<body>


<div class="phone">



<div id="listPage">


<header>

<h2>
Chat
</h2>


<div>

<button onclick="createChar()">
＋
</button>

<button>
⌕
</button>


</div>

</header>




<div class="glass">

<h3 id="user">
未创建 User
</h3>

<p>
聊天空间
</p>

<button onclick="createUser()">
创建 User
</button>


</div>





<div id="contacts">


<div class="empty">

暂无联系人

<br>

请创建 Character

</div>


</div>




<div class="bottom">

<button>
联系人
</button>

<button onclick="createChar()">
添加
</button>

<button>
朋友圈
</button>

<button>
主页
</button>


</div>


</div>







<div id="chatRoom">


<header>

<button onclick="backList()">
‹
</button>


<h2 id="charTitle">
</h2>


</header>



<div class="messages" id="messages">

</div>



<div class="input">

<input id="text"
placeholder=""
>


<button class="send"
onclick="send()">

发送

</button>

</div>


</div>





</div>





<script>


let chars=
JSON.parse(localStorage.getItem("chars"))
||[];


let current=null;




function createUser(){

let name=
prompt("输入User名字");


if(name){

localStorage.setItem(
"user",
name
);


document.getElementById(
"user"
).innerText=name;

}


}




function createChar(){


let name=
prompt("输入Character名字");


if(!name)return;



let c={

name:name,

messages:[]

};



chars.push(c);


localStorage.setItem(
"chars",
JSON.stringify(chars)
);



load();


}



function load(){


let box=
document.getElementById("contacts");


box.innerHTML="";


if(chars.length===0){

box.innerHTML=
`
<div class="empty">
暂无联系人
<br>
请创建 Character
</div>
`;

return;

}



chars.forEach((c,i)=>{


let div=
document.createElement("div");


div.className="contact";


div.innerHTML=

`

<div class="avatar"></div>

<div>
<h3>${c.name}</h3>
<p>Character</p>
</div>

`;



div.onclick=()=>openChat(i);



box.appendChild(div);



});


}



function openChat(i){


current=chars[i];


document.getElementById(
"listPage"
).style.display="none";


document.getElementById(
"chatRoom"
).style.display="block";


document.getElementById(
"charTitle"
).innerText=current.name;


document.getElementById(
"messages"
).innerHTML="";


}




function send(){


let input=
document.getElementById("text");


if(!input.value)return;



let div=
document.createElement("div");


div.className=
"msg user";


div.innerText=input.value;


document
.getElementById("messages")
.appendChild(div);



current.messages.push(
input.value
);



localStorage.setItem(
"chars",
JSON.stringify(chars)
);



input.value="";

}




function backList(){


document.getElementById(
"listPage"
).style.display="block";


document.getElementById(
"chatRoom"
).style.display="none";


}



load();


</script>


</body>
