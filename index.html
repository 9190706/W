<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Angel</title>


<style>

*{
    box-sizing:border-box;
    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "SF Pro Display",
    "PingFang SC",
    sans-serif;
}


body{

    margin:0;
    height:100vh;
    overflow:hidden;

    background:
    linear-gradient(
    135deg,
    #f7f7f8,
    #dfe5ee
    );

}



/* 主屏幕 */

.screen{

    width:100vw;
    height:100vh;

    padding:45px 25px;

    position:relative;

}



/* 顶部 */

.time{

    font-size:58px;
    font-weight:300;

    color:#222;

}


.date{

    margin-top:5px;

    color:#777;

}



/* Angel小组件 */

.widget{

    margin-top:35px;

    padding:25px;

    border-radius:32px;


    background:

    rgba(255,255,255,.45);


    backdrop-filter:blur(25px);


    box-shadow:

    0 20px 50px rgba(0,0,0,.08);


}


.widget h1{

    margin:0;

    font-size:30px;

}


.widget p{

    margin-top:12px;

    color:#777;

}



/* App区域 */


.apps{


    margin-top:45px;


    display:grid;

    grid-template-columns:
    repeat(3,1fr);


    gap:35px 25px;


}




.app{

    text-align:center;

    cursor:pointer;

}




.icon{


    width:78px;

    height:78px;


    margin:auto;


    border-radius:27px;



    background:

    rgba(255,255,255,.55);



    backdrop-filter:blur(20px);



    display:flex;

    align-items:center;

    justify-content:center;



    box-shadow:


    inset 0 1px 8px rgba(255,255,255,.8),


    0 15px 30px rgba(0,0,0,.12);



    transition:.25s;


}



.icon:active{

    transform:scale(.9);

}



.icon svg{

    width:34px;

    height:34px;

    stroke:#222;

}



.app span{


    display:block;

    margin-top:10px;


    font-size:13px;

    color:#333;


}



/* 底部dock */


.dock{


    position:absolute;


    bottom:30px;


    left:25px;

    right:25px;



    height:85px;



    border-radius:35px;



    background:


    rgba(255,255,255,.5);



    backdrop-filter:blur(30px);



    display:flex;


    justify-content:space-around;


    align-items:center;


}



.dock .small{


    width:55px;

    height:55px;


    border-radius:20px;


    background:

    rgba(255,255,255,.8);



    display:flex;


    justify-content:center;


    align-items:center;


}





/* AI 页面 */

.ai-page{


    position:absolute;


    inset:0;



    background:


    rgba(245,245,245,.75);



    backdrop-filter:blur(35px);



    padding:40px 25px;



    transform:translateY(100%);



    transition:.45s;


}



.ai-page.show{


    transform:translateY(0);


}



.back{


    font-size:30px;

    cursor:pointer;

}



.ai-title{


    font-size:32px;

    margin-top:25px;


}



.status{

    color:#888;

}



.chat{


    margin-top:40px;


}



.message{


    max-width:75%;


    padding:16px 20px;


    border-radius:25px;


    margin-bottom:18px;


    line-height:1.5;


}



.from-ai{


    background:white;


}



.from-user{


    background:#222;


    color:white;


    margin-left:auto;


}



.input{


    position:absolute;


    bottom:30px;


    left:25px;

    right:25px;


    height:55px;



    background:white;


    border-radius:30px;


    display:flex;


    align-items:center;


    padding-left:20px;


    color:#999;


}



</style>

</head><body>


<div class="screen">


<div class="time">
01:25
</div>


<div class="date">
July 12 · Saturday
</div>



<div class="widget">

<h1>
Angel
</h1>

<p>
♡ 在线陪伴中<br>
今天也会陪着你
</p>

</div>



<div class="apps">


<!-- AI -->

<div class="app" onclick="openAI()">

<div class="icon">

<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">

<path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5Z"/>

</svg>

</div>

<span>
AI
</span>

</div>




<!-- 聊天 -->

<div class="app" onclick="openAI()">

<div class="icon">

<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">

<path d="M4 5H20V16H8L4 20V5Z"/>

</svg>

</div>

<span>
聊天
</span>

</div>





<!-- 查找 -->

<div class="app">

<div class="icon">

<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">

<circle cx="11" cy="11" r="7"/>

<line x1="16" y1="16" x2="21" y2="21"/>

</svg>

</div>

<span>
查找
</span>

</div>





<!-- 手机 -->

<div class="app">

<div class="icon">

<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">

<rect x="7" y="2" width="10" height="20" rx="3"/>

</svg>

</div>

<span>
手机
</span>

</div>





<!-- 微博 -->

<div class="app">

<div class="icon">

<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">

<circle cx="12" cy="12" r="9"/>

<path d="M8 12H16"/>

</svg>

</div>

<span>
微博
</span>

</div>





<!-- 线下 -->

<div class="app">

<div class="icon">

<svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">

<path d="M12 21C12 21 19 14 19 9A7 7 0 0 0 5 9C5 14 12 21 12 21Z"/>

<circle cx="12" cy="9" r="2"/>

</svg>

</div>

<span>
线下
</span>

</div>


</div>




<div class="dock">

<div class="small">
⌂
</div>

<div class="small">
♡
</div>

<div class="small">
○
</div>

</div>




</div>





<!-- AI聊天页面 -->


<div class="ai-page" id="aiPage">


<div class="back" onclick="closeAI()">
‹
</div>


<div class="ai-title">
Angel AI
</div>


<div class="status">
● 在线
</div>



<div class="chat">


<div class="message from-ai">

晚上好。<br>
今天过得怎么样？

</div>



<div class="message from-user">

还可以

</div>



<div class="message from-ai">

听起来有一点累。<br>
要不要陪你聊一会？

</div>


</div>



<div class="input">

输入消息...

</div>



</div>





<script>


function openAI(){

document
.getElementById("aiPage")
.classList.add("show");

}



function closeAI(){

document
.getElementById("aiPage")
.classList.remove("show");

}


</script>



</body>

</html>
